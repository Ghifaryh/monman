version: '3.9'

# API + frontend; SQLite persisted in named volume. Run migrations inside the image or once at startup (see backend README).
services:
  frontend:
    build: ./frontend
    container_name: monman-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      - NODE_ENV=production

  api:
    build: ./backend
    container_name: monman-api
    ports:
      - "8080:8080"
    environment:
      - SQLITE_PATH=/data/monman.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - API_PORT=8080
    volumes:
      - monman_data:/data
    restart: unless-stopped

volumes:
  monman_data:
    driver: local

# Optional: Postgres for legacy development only. Default workflow uses SQLite (see README).
services:
  db:
    image: postgres:16-alpine
    container_name: monman-db-dev
    profiles:
      - postgres
    environment:
      POSTGRES_USER: monman_user
      POSTGRES_PASSWORD: monman_pass
      POSTGRES_DB: monman_db
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data_dev:
    driver: local
